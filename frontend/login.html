<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Login</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");

    :root {
      --ink: #10121a;
      --ink-soft: #444756;
      --accent: #6c63ff;
      --accent-2: #ff7a59;
      --line: rgba(15, 23, 42, 0.12);
      --error: #b04c2f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", system-ui, sans-serif;
      background: #ffffff;
      color: var(--ink);
    }

    .card {
      padding: 22px 22px 24px;
      display: grid;
      gap: 12px;
    }

    .header {
      display: grid;
      gap: 4px;
    }

    .header h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .header span {
      color: var(--ink-soft);
      font-size: 0.85rem;
    }

    label {
      font-size: 0.85rem;
      color: var(--ink-soft);
    }

    input {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-size: 0.95rem;
      background: #fbfbfd;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #6c63ff, #22c55e);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .note {
      font-size: 0.78rem;
      color: var(--ink-soft);
    }

    .error {
      font-size: 0.85rem;
      color: var(--error);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h3>Welcome back</h3>
      <span>Login with your admin-provided credentials.</span>
    </div>
    <div>
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Username" />
    </div>
    <div>
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Password" />
    </div>
    <div class="note">No signup here. Contact admin for access.</div>
    <div class="error" id="error"></div>
    <button id="login" type="button">Login</button>
  </div>

  <script>
    const API_BASE_DEFAULT = "http://127.0.0.1:8000";

    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const errorEl = document.getElementById("error");
    const loginBtn = document.getElementById("login");

    const apiUrl = (path) => {
      const base = localStorage.getItem("api_base") || API_BASE_DEFAULT;
      return `${base.replace(/\/$/, "")}${path}`;
    };

    const login = async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!username || !password) {
        errorEl.textContent = "Enter username and password.";
        return;
      }

      loginBtn.disabled = true;
      errorEl.textContent = "";
      try {
        const res = await fetch(apiUrl("/auth/login"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.error) {
          throw new Error(data.error);
        }
        localStorage.setItem("auth_user", data.username);
        localStorage.setItem("auth_role", data.role || "user");
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(
            { type: "login-success", username: data.username, role: data.role || "user" },
            "*"
          );
          try {
            window.parent.location.href = "humanizer.html";
          } catch {
            // Parent navigation blocked; fallback to message only.
          }
        } else {
          window.location.href = "humanizer.html";
        }
      } catch (err) {
        const msg = err && err.message ? err.message : "Login failed.";
        if (msg.toLowerCase().includes("failed to fetch")) {
          errorEl.textContent = "Login request failed. Ensure the API is running and open the site via a local server (not file://).";
        } else {
          errorEl.textContent = msg;
        }
      } finally {
        loginBtn.disabled = false;
      }
    };

    loginBtn.addEventListener("click", login);
  </script>
</body>
</html>
