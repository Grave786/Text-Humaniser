<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Humanizer Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap");
    html, body { height: 100%; }
    body { font-family: "Outfit", system-ui, sans-serif; }
    h1, h2, h3 { font-family: "Playfair Display", serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-indigo-50 to-sky-100 text-slate-900">
  <main class="mx-auto flex min-h-screen w-full items-center justify-center px-4 py-6 sm:px-6 sm:py-10 lg:px-8">
    <div class="w-full max-w-md rounded-3xl border border-white/60 bg-white/90 p-5 shadow-2xl backdrop-blur sm:p-8">
      <h2 class="text-xl font-semibold text-slate-900 sm:text-2xl">Welcome back</h2>
      <p class="mt-2 text-sm text-slate-600">Login with your admin-provided credentials.</p>

      <div class="mt-6 space-y-4">
        <div>
          <label class="text-xs font-semibold uppercase text-slate-500" for="username">Username</label>
          <input id="username" class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm sm:py-3" type="text" placeholder="Username" />
        </div>
        <div>
          <label class="text-xs font-semibold uppercase text-slate-500" for="password">Password</label>
          <input id="password" class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm sm:py-3" type="password" placeholder="Password" />
        </div>
      </div>

      <p class="mt-4 text-xs text-slate-500">No signup here. Contact admin for access.</p>
      <div class="mt-2 text-sm text-rose-500" id="error"></div>

      <button id="login" class="mt-6 w-full rounded-full bg-gradient-to-r from-rose-500 to-amber-400 px-6 py-2.5 text-sm font-semibold text-white shadow-lg sm:py-3" type="button">Login</button>
    </div>
  </main>
  <script src="dist/login.bundle.min.js"></script>
</body>
</html>
