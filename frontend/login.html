<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Humanizer Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap");
    body { font-family: "Outfit", system-ui, sans-serif; }
    h1, h2, h3 { font-family: "Playfair Display", serif; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-indigo-50 to-sky-100 text-slate-900">
  <header class="sticky top-0 z-20 w-full bg-slate-950 text-slate-100 shadow-xl">
    <div class="flex w-full items-center justify-between gap-6 px-8 py-5">
      <div class="text-xl font-semibold text-emerald-300">Humanizer Login</div>
    </div>
  </header>

  <main class="mx-auto flex min-h-[70vh] w-full items-center justify-center px-8 py-12">
    <div class="w-full max-w-md rounded-3xl border border-white/60 bg-white/90 p-8 shadow-2xl backdrop-blur">
      <h2 class="text-2xl font-semibold text-slate-900">Welcome back</h2>
      <p class="mt-2 text-sm text-slate-600">Login with your admin-provided credentials.</p>

      <div class="mt-6 space-y-4">
        <div>
          <label class="text-xs font-semibold uppercase text-slate-500" for="username">Username</label>
          <input id="username" class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm" type="text" placeholder="Username" />
        </div>
        <div>
          <label class="text-xs font-semibold uppercase text-slate-500" for="password">Password</label>
          <input id="password" class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm" type="password" placeholder="Password" />
        </div>
      </div>

      <p class="mt-4 text-xs text-slate-500">No signup here. Contact admin for access.</p>
      <div class="mt-2 text-sm text-rose-500" id="error"></div>

      <button id="login" class="mt-6 w-full rounded-full bg-gradient-to-r from-rose-500 to-amber-400 px-6 py-3 text-sm font-semibold text-white shadow-lg" type="button">Login</button>
    </div>
  </main>

  <footer class="mt-6 bg-slate-950 text-slate-200">
    <div class="border-t border-white/10 py-4 text-center text-xs text-slate-400">Copyscape Humanizer · Secure login</div>
  </footer>

  <script>
    const API_BASE_DEFAULT = "http://127.0.0.1:8000";

    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const errorEl = document.getElementById("error");
    const loginBtn = document.getElementById("login");

    const apiUrl = (path) => {
      const base = localStorage.getItem("api_base") || API_BASE_DEFAULT;
      return `${base.replace(/\/$/, "")}${path}`;
    };

    const login = async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!username || !password) {
        errorEl.textContent = "Enter username and password.";
        return;
      }

      loginBtn.disabled = true;
      errorEl.textContent = "";
      try {
        const res = await fetch(apiUrl("/auth/login"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.error) {
          throw new Error(data.error);
        }
        localStorage.setItem("auth_user", data.username);
        localStorage.setItem("auth_role", data.role || "user");
        const target = data.role === "admin" ? "admin.html" : "humanizer.html";

        if (window.parent && window.parent !== window) {
          window.parent.postMessage(
            { type: "login-success", username: data.username, role: data.role || "user" },
            "*"
          );
          try {
            window.parent.location.href = target;
          } catch {
            // Parent navigation blocked; fallback to message only.
          }
        } else {
          window.location.href = target;
        }
      } catch (err) {
        errorEl.textContent = err.message || "Login failed.";
      } finally {
        loginBtn.disabled = false;
      }
    };

    loginBtn.addEventListener("click", login);
  </script>
</body>
</html>
