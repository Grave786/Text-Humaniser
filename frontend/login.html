<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Humanizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-indigo-50 to-sky-100 text-slate-900">
  <header class="sticky top-0 z-20 bg-slate-950 text-slate-100 shadow-xl">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-6 px-6 py-4">
      <div class="text-lg font-bold text-emerald-300">Humanizer Login</div>
    </div>
  </header>

  <main class="mx-auto flex min-h-[70vh] max-w-6xl items-center justify-center px-6 py-10">
    <div class="w-full max-w-md rounded-2xl border border-white/30 bg-white/80 p-6 shadow-2xl backdrop-blur">
      <div class="mb-4">
        <h2 class="text-xl font-semibold">Welcome back</h2>
        <p class="text-sm text-slate-600">Login with your admin-provided credentials.</p>
      </div>
      <div class="space-y-3">
        <div>
          <label class="text-xs font-semibold uppercase text-slate-500" for="username">Username</label>
          <input id="username" class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" type="text" placeholder="Username" />
        </div>
        <div>
          <label class="text-xs font-semibold uppercase text-slate-500" for="password">Password</label>
          <input id="password" class="mt-1 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" type="password" placeholder="Password" />
        </div>
      </div>
      <p class="mt-3 text-xs text-slate-500">No signup here. Contact admin for access.</p>
      <div class="mt-2 text-sm text-rose-500" id="error"></div>
      <button id="login" class="mt-4 w-full rounded-full bg-gradient-to-r from-rose-500 to-amber-400 px-4 py-2 text-sm font-semibold text-white shadow" type="button">Login</button>
    </div>
  </main>

  <footer class="bg-slate-950 py-4 text-center text-xs text-slate-400">
    Copyscape Humanizer · Secure login
  </footer>

  <script>
    const API_BASE_DEFAULT = "http://127.0.0.1:8000";

    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const errorEl = document.getElementById("error");
    const loginBtn = document.getElementById("login");

    const apiUrl = (path) => {
      const base = localStorage.getItem("api_base") || API_BASE_DEFAULT;
      return `${base.replace(/\/$/, "")}${path}`;
    };

    const login = async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!username || !password) {
        errorEl.textContent = "Enter username and password.";
        return;
      }

      loginBtn.disabled = true;
      errorEl.textContent = "";
      try {
        const res = await fetch(apiUrl("/auth/login"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.error) {
          throw new Error(data.error);
        }
        localStorage.setItem("auth_user", data.username);
        localStorage.setItem("auth_role", data.role || "user");
        const target = data.role === "admin" ? "admin.html" : "humanizer.html";

        if (window.parent && window.parent !== window) {
          window.parent.postMessage(
            { type: "login-success", username: data.username, role: data.role || "user" },
            "*"
          );
          try {
            window.parent.location.href = target;
          } catch {
            // Parent navigation blocked; fallback to message only.
          }
        } else {
          window.location.href = target;
        }
      } catch (err) {
        errorEl.textContent = err.message || "Login failed.";
      } finally {
        loginBtn.disabled = false;
      }
    };

    loginBtn.addEventListener("click", login);
  </script>
</body>
</html>
