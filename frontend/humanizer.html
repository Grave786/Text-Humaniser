<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Humanizer Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-indigo-50 to-sky-100 text-slate-900">
  <header class="sticky top-0 z-20 bg-slate-950 text-slate-100 shadow-xl">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-6 px-6 py-4">
      <div class="text-lg font-bold text-emerald-300">Humanizer</div>
      <nav class="flex items-center gap-4 text-sm font-medium text-slate-200">
        <a class="hover:text-white" href="landing.html">Home</a>
        <a class="hover:text-white" href="#workspace">Workspace</a>
        <a class="hover:text-white" href="#output">Output</a>
        <a class="hidden hover:text-white" href="admin.html" id="admin-link">Admin</a>
        <a class="hover:text-white" href="#" id="logout-btn">Logout</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto grid max-w-6xl gap-6 px-6 py-8" id="workspace">
    <div class="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
      <section class="rounded-2xl border border-white/60 bg-white/80 p-6 shadow-xl">
        <h2 class="text-lg font-semibold">Input</h2>
        <div class="mt-4 grid gap-3">
          <label class="text-sm text-slate-600" for="input-text">Paste your text</label>
          <textarea id="input-text" class="min-h-[180px] w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800 focus:outline-none" placeholder="Drop raw text here..."></textarea>

          <div class="flex flex-wrap items-center gap-3 text-xs text-slate-600">
            <label class="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-1">
              <input id="debug-toggle" type="checkbox" />
              Show pipeline stages
            </label>
            <label class="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-1">
              <input id="segment-toggle" type="checkbox" />
              Show segments
            </label>
          </div>

          <div class="flex flex-wrap gap-3">
            <button id="humanize-btn" class="rounded-full bg-gradient-to-r from-indigo-500 to-emerald-400 px-5 py-2 text-sm font-semibold text-white shadow">Humanize</button>
            <button id="clear-btn" class="rounded-full border border-slate-200 bg-white px-5 py-2 text-sm font-semibold text-slate-700">Clear</button>
            <button id="copy-btn" class="rounded-full border border-slate-200 bg-white px-5 py-2 text-sm font-semibold text-slate-700">Copy output</button>
          </div>
        </div>
      </section>

      <section class="rounded-2xl border border-white/60 bg-white/80 p-6 shadow-xl" id="output">
        <h2 class="text-lg font-semibold">Output</h2>
        <div id="output-text" class="mt-4 min-h-[200px] rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800">Run the pipeline to see results.</div>
        <div id="metrics" class="mt-4 flex flex-wrap gap-2"></div>
        <div id="stages" class="mt-4 space-y-4"></div>
      </section>
    </div>
  </main>

  <footer class="bg-slate-950 py-4 text-center text-xs text-slate-400">
    Copyscape Humanizer · Private workspace
  </footer>

  <script>
    const API_BASE_DEFAULT = "http://127.0.0.1:8000";

    const inputText = document.getElementById("input-text");
    const outputText = document.getElementById("output-text");
    const metrics = document.getElementById("metrics");
    const stages = document.getElementById("stages");
    const humanizeBtn = document.getElementById("humanize-btn");
    const copyBtn = document.getElementById("copy-btn");
    const clearBtn = document.getElementById("clear-btn");
    const debugToggle = document.getElementById("debug-toggle");
    const segmentToggle = document.getElementById("segment-toggle");
    const logoutBtn = document.getElementById("logout-btn");
    const adminLink = document.getElementById("admin-link");

    const sessionUser = localStorage.getItem("auth_user");
    const sessionRole = localStorage.getItem("auth_role");
    if (!sessionUser) {
      window.location.href = "landing.html";
    }
    if (sessionRole === "admin") {
      adminLink.style.display = "inline";
    }

    const apiUrl = (path) => {
      const base = localStorage.getItem("api_base") || API_BASE_DEFAULT;
      return `${base.replace(/\/$/, "")}${path}`;
    };

    const showMetrics = (items) => {
      metrics.innerHTML = "";
      items.forEach((item) => {
        const el = document.createElement("span");
        el.className = "rounded-full bg-slate-900 px-3 py-1 text-xs text-white";
        el.textContent = item;
        metrics.appendChild(el);
      });
    };

    const showStages = (stageData) => {
      stages.innerHTML = "";
      if (!stageData) {
        return;
      }
      Object.entries(stageData).forEach(([key, value]) => {
        const section = document.createElement("div");
        section.className = "rounded-2xl border border-slate-200 bg-white p-4";
        const title = document.createElement("h3");
        title.className = "text-sm font-semibold";
        title.textContent = key.replace(/_/g, " ");
        const score = document.createElement("span");
        score.className = "mr-2 inline-flex rounded-full bg-slate-900 px-3 py-1 text-xs text-white";
        score.textContent = `ai: ${value.ai_probability}`;
        const count = document.createElement("span");
        count.className = "inline-flex rounded-full bg-slate-200 px-3 py-1 text-xs text-slate-700";
        count.textContent = `${value.word_count} words`;
        const text = document.createElement("div");
        text.className = "mt-3 rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm";
        text.textContent = value.text;
        section.appendChild(title);
        section.appendChild(score);
        section.appendChild(count);
        section.appendChild(text);
        stages.appendChild(section);
      });
    };

    const handleHumanize = async () => {
      const text = inputText.value.trim();
      if (!text) {
        return;
      }

      humanizeBtn.disabled = true;

      const payload = { text, username: sessionUser };
      const useDebug = debugToggle.checked;
      const useSegments = segmentToggle.checked;

      try {
        if (useSegments) {
          const segmentRes = await fetch(apiUrl("/segment"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          const segmentData = await segmentRes.json();
          if (segmentData.error) {
            throw new Error(segmentData.error);
          }
          showMetrics([
            `paragraphs: ${segmentData.paragraph_count}`,
            `sentences: ${segmentData.sentence_count}`,
            `chunks: ${segmentData.chunk_count}`,
          ]);
        }

        const res = await fetch(apiUrl(useDebug ? "/humanize/debug" : "/humanize"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        if (useDebug) {
          outputText.textContent = data.stages.final.text;
          showStages(data.stages);
          showMetrics([
            `ai: ${data.stages.final.ai_probability}`,
            `words: ${data.stages.final.word_count}`,
          ]);
        } else {
          outputText.textContent = data.humanized_text;
          showStages(null);
          showMetrics([
            `ai: ${data.detector_ai_probability}`,
            `words: ${data.humanized_text.split(/\s+/).filter(Boolean).length}`,
          ]);
        }
      } catch (err) {
        outputText.textContent = err.message || "Request failed";
        showStages(null);
      } finally {
        humanizeBtn.disabled = false;
      }
    };

    const handleLogout = (event) => {
      if (event) {
        event.preventDefault();
      }
      localStorage.removeItem("auth_user");
      localStorage.removeItem("auth_role");
      window.location.href = "landing.html";
    };

    humanizeBtn.addEventListener("click", handleHumanize);
    logoutBtn.addEventListener("click", handleLogout);
    clearBtn.addEventListener("click", () => {
      inputText.value = "";
      outputText.textContent = "Run the pipeline to see results.";
      showStages(null);
      showMetrics([]);
    });
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(outputText.textContent);
      } catch {
        // ignore
      }
    });
  </script>
</body>
</html>
